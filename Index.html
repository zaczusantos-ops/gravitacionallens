<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagrama de Parâmetro de Impacto (b) Unificado</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #canvasContainer {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            background-color: white;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="canvasContainer">
        <canvas id="orbitCanvas" width="800" height="600"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('orbitCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const M_pos = { x: width / 2, y: height / 2 };
        const M_radius = 20;
        const b_value = 100; // Parâmetro de impacto visível
        const M_strength = 20000; // Força gravitacional para visualização
        const trajectoryColor = '#4CAF50'; // Cor verde de origem
        const referenceColor = '#888'; // Cor para linhas de referência

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Desenhar Massa M
            ctx.beginPath();
            ctx.arc(M_pos.x, M_pos.y, M_radius, 0, 2 * Math.PI);
            ctx.fillStyle = 'black';
            ctx.fill();
            ctx.font = '24px Arial';
            ctx.fillText('M', M_pos.x + M_radius + 10, M_pos.y + 8);

            // Linhas de referência para b
            ctx.strokeStyle = referenceColor;
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);

            // Eixo central
            ctx.beginPath();
            ctx.moveTo(0, M_pos.y);
            ctx.lineTo(width, M_pos.y);
            ctx.stroke();

            // Trajetória reta de b
            ctx.beginPath();
            ctx.moveTo(0, M_pos.y - b_value);
            ctx.lineTo(width / 2, M_pos.y - b_value); // Desenhar apenas até a metade para clareza
            ctx.stroke();

            ctx.setLineDash([]);

            // Linha de medida de b
            ctx.strokeStyle = referenceColor;
            ctx.beginPath();
            ctx.moveTo(M_pos.x - 200, M_pos.y);
            ctx.lineTo(M_pos.x - 200, M_pos.y - b_value);
            ctx.stroke();

            // Setas de medida
            drawArrowhead(ctx, M_pos.x - 200, M_pos.y - b_value, -Math.PI/2, 10, referenceColor);
            drawArrowhead(ctx, M_pos.x - 200, M_pos.y, Math.PI/2, 10, referenceColor);

            // Rótulo b
            ctx.fillStyle = referenceColor;
            ctx.fillText('b', M_pos.x - 190, M_pos.y - b_value / 2 + 8);

            // Desenhar a órbita estendida
            drawTrajectory();
        }

        function drawArrowhead(ctx, x, y, angle, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + size * Math.cos(angle - Math.PI / 6), y + size * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x + size * Math.cos(angle + Math.PI / 6), y + size * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fill();
        }

        function drawTrajectory() {
            let path = [];
            // Estado inicial: longe à esquerda, vindo reta
            let x = -width / 2; // Posição x em relação a M_pos.x
            let y = -b_value; // Posição y em relação a M_pos.y
            let vx = 10;
            let vy = 0;
            let dt = 0.1;
            let maxSteps = 1000;

            path.push({ x: x + M_pos.x, y: y + M_pos.y });

            for (let step = 0; step < maxSteps; step++) {
                let r2 = x * x + y * y;
                if (r2 < (M_radius + 5) * (M_radius + 5)) break; // Colisão

                let r = Math.sqrt(r2);
                let ax = -(M_strength * x) / (r * r2);
                let ay = -(M_strength * y) / (r * r2);

                vx += ax * dt;
                vy += ay * dt;
                x += vx * dt;
                y += vy * dt;

                path.push({ x: x + M_pos.x, y: y + M_pos.y });

                if (x > width / 2 + 200) break; // Saiu da tela
            }

            // Desenhar a linha estendida
            ctx.strokeStyle = trajectoryColor;
            ctx.lineWidth = 3;
            ctx.beginPath();
            if (path.length > 0) {
                ctx.moveTo(path[0].x, path[0].y);
                for (let i = 1; i < path.length; i++) {
                    ctx.lineTo(path[i].x, path[i].y);
                }
            }
            ctx.stroke();
        }

        draw();
    </script>
</body>
</html>
